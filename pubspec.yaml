name: juntapp
description: "JuntApp - Organización de pagos grupales para eventos."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  firebase_core: ^4.1.1
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  intl: ^0.20.2
  file_picker: ^10.3.2
  uuid: ^4.5.1
  url_launcher: ^6.3.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  image_path: assets/branding/juntapp_logo.png
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/branding/juntapp_logo.png
    background_color: "#FFFFFF"
    theme_color: "#22C55E"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/juntapp_logo.png
  remove_alpha_ios: true
